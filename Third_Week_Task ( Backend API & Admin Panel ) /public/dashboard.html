<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: rgb(111, 111, 111);
        }

        h2 {
            color: white;
            margin-bottom: 45px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
            flex-direction: column;
        }

        input,
        button {
            margin: 10px;
            padding: 10px;
        }

        thead {
            margin: auto;
            border-collapse: collapse;
            border: 3px solid black;
            background-color: #fff;

        }

        tbody {
            background-color: #fff;

        }

        td,
        th {
            padding: 10px;
            color: black;
        }
    </style>
</head>

<body>



    <div class="container">
        <h2>USERS REGISTRATION</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Message</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>

    <script src="dashboard.js"></script>

</body>

</html>
